<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>triEV RSA — Staff Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:     #07090f;
            --card:   #0f1320;
            --border: #1a2035;
            --text:   #e8f0fe;
            --text2:  #6b8cba;
            --text3:  #2d3f5a;
            --orange: #ff8c00;
            --orange2:#ff5c00;
            --red:    #ff4444;
            --green:  #00d4a0;
            --blue:   #3fa7e8;
        }

        html, body {
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: 'Sora', sans-serif;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            /* subtle radial glow */
            background:
                radial-gradient(ellipse at 20% 30%, rgba(255,140,0,.07) 0%, transparent 55%),
                radial-gradient(ellipse at 80% 75%, rgba(63,167,232,.06) 0%, transparent 50%),
                var(--bg);
        }

        .wrap {
            width: 100%;
            max-width: 400px;
        }

        /* LOGO */
        .logo-row {
            display: flex;
            align-items: center;
            gap: 12px;
            justify-content: center;
            margin-bottom: 32px;
        }
        .logo-mark {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, var(--orange), var(--orange2));
            border-radius: 13px;
            display: grid;
            place-items: center;
            font-size: 22px;
            box-shadow: 0 6px 20px rgba(255,140,0,.35);
        }
        .logo-text  { font-size: 22px; font-weight: 800; letter-spacing: -.5px; }
        .logo-sub   { font-size: 11px; color: var(--text2); margin-top: 1px; font-weight: 600; }

        /* CARD */
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 32px 28px;
        }

        .card-title {
            font-size: 20px;
            font-weight: 800;
            margin-bottom: 4px;
        }
        .card-sub {
            font-size: 13px;
            color: var(--text2);
            margin-bottom: 28px;
        }

        /* FORM */
        .field { margin-bottom: 16px; }

        label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            color: var(--text2);
            text-transform: uppercase;
            letter-spacing: .5px;
            margin-bottom: 6px;
        }

        input {
            width: 100%;
            background: #0a0d18;
            border: 1.5px solid var(--border);
            border-radius: 10px;
            padding: 13px 14px;
            font-size: 15px;
            color: var(--text);
            font-family: 'Sora', sans-serif;
            font-weight: 500;
            outline: none;
            transition: border-color .2s, box-shadow .2s;
        }
        input::placeholder { color: var(--text3); font-weight: 400; }
        input:focus {
            border-color: var(--orange);
            box-shadow: 0 0 0 3px rgba(255,140,0,.1);
        }

        /* ERROR */
        .error-box {
            display: none;
            background: rgba(255,68,68,.08);
            border: 1px solid rgba(255,68,68,.2);
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 13px;
            color: var(--red);
            margin-bottom: 16px;
            font-weight: 600;
        }

        /* BUTTON */
        .btn-login {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--orange), var(--orange2));
            color: #fff;
            font-size: 15px;
            font-family: 'Sora', sans-serif;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 8px 24px rgba(255,140,0,.35);
            transition: opacity .2s, transform .15s;
            letter-spacing: .3px;
            margin-top: 4px;
        }
        .btn-login:hover   { opacity: .92; }
        .btn-login:active  { transform: scale(.97); }
        .btn-login:disabled {
            opacity: .5;
            cursor: not-allowed;
            transform: none;
        }

        /* SPINNER inside button */
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,.4);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin .7s linear infinite;
            vertical-align: middle;
            margin-right: 6px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ROLE BADGES (shown after login while redirecting) */
        .redirect-msg {
            display: none;
            text-align: center;
            margin-top: 16px;
            font-size: 13px;
            color: var(--green);
            font-weight: 600;
        }

        /* BACK LINK */
        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: var(--text2);
            text-decoration: none;
            transition: color .2s;
        }
        .back-link:hover { color: var(--text); }

        /* ROLE HINT */
        .role-hints {
            display: flex;
            gap: 8px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        .rh {
            flex: 1;
            background: #0a0d18;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 12px;
            font-size: 11px;
            color: var(--text2);
            text-align: center;
            cursor: pointer;
            transition: border-color .2s;
            min-width: 100px;
        }
        .rh:hover { border-color: rgba(255,140,0,.3); color: var(--orange); }
        .rh-icon  { font-size: 18px; display: block; margin-bottom: 4px; }
        .rh-label { font-weight: 700; display: block; margin-bottom: 2px; }
    </style>
</head>
<body>

<div class="wrap">

    <!-- LOGO -->
    <div class="logo-row">
        <img src="triev_logo.png" style="height:44px;width:auto;object-fit:contain">
        <div>
            <div class="logo-text" style="display:none">TriEV RSA</div>
            <div class="logo-sub">Staff Portal</div>
        </div>
    </div>

    <!-- CARD -->
    <div class="card">
        <div class="card-title">Welcome back</div>
        <div class="card-sub">Sign in to access the RSA system</div>

        <div class="error-box" id="errorBox"></div>

        <div class="field">
            <label>Email Address</label>
            <input
                type="email"
                id="email"
                placeholder="you@triev.in"
                autocomplete="email"
                onkeydown="if(event.key==='Enter') login()"
            >
        </div>

        <div class="field">
            <label>Password</label>
            <input
                type="password"
                id="password"
                placeholder="Enter your password"
                autocomplete="current-password"
                onkeydown="if(event.key==='Enter') login()"
            >
        </div>

        <button class="btn-login" id="loginBtn" onclick="login()">
            Sign In
        </button>

        <div class="redirect-msg" id="redirectMsg"></div>
    </div>

    <a class="back-link" href="/">← Back to Rider App</a>

</div>

<script>
    // -----------------------------------------------
    // Role → redirect map
    // -----------------------------------------------
    const ROLE_REDIRECT = {
        super_admin:     "/admin",
        admin:           "/admin",
        founder:         "/admin",
        rsa_manager:     "/control",
        service_manager: "/control",
        data_analyst:    "/admin",
        technician:      "/tech",
        viewer:          "/control",
    };

    // -----------------------------------------------
    // Login
    // -----------------------------------------------
    async function login() {
        const email    = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        const btn      = document.getElementById("loginBtn");
        const errBox   = document.getElementById("errorBox");

        // Clear previous error
        errBox.style.display = "none";

        if (!email || !password) {
            showError("Please enter your email and password.");
            return;
        }

        // Loading state
        btn.disabled    = true;
        btn.innerHTML   = '<span class="spinner"></span> Signing in…';

        try {
            const res = await fetch("/api/login", {
                method:  "POST",
                headers: { "Content-Type": "application/json" },
                body:    JSON.stringify({ email, password }),
            });

            const data = await res.json();

            if (!res.ok) {
                // FastAPI returns { detail: "..." } on 401/403
                showError(data.detail || "Login failed. Please try again.");
                return;
            }

            // Store JWT + user info
            localStorage.setItem("token",      data.token);
            localStorage.setItem("user_name",  data.name);
            localStorage.setItem("user_role",  data.role);
            localStorage.setItem("user_id",    data.user_id);
            localStorage.setItem("user_email", data.email||'');

            // Show redirect message
            const dest = ROLE_REDIRECT[data.role] || "/control";
            document.getElementById("redirectMsg").style.display = "block";
            document.getElementById("redirectMsg").textContent =
                `✓ Welcome, ${data.name}! Redirecting…`;

            setTimeout(() => {
                window.location.href = dest;
            }, 600);

        } catch (err) {
            showError("Could not reach the server. Please check your connection.");
        } finally {
            btn.disabled  = false;
            btn.innerHTML = "Sign In";
        }
    }

    function showError(msg) {
        const box = document.getElementById("errorBox");
        box.textContent   = msg;
        box.style.display = "block";
    }

    // -----------------------------------------------
    // If already logged in, redirect immediately
    // -----------------------------------------------
    (function checkExistingSession() {
        const token = localStorage.getItem("token");
        const role  = localStorage.getItem("user_role");
        if (token && role) {
            const dest = ROLE_REDIRECT[role] || "/control";
            window.location.href = dest;
        }
    })();
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>RSA Control Room</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
margin:0;
background:#f1f5f9;
display:flex;
height:100vh;
}

/* SIDEBAR */

.sidebar{
width:230px;
background:#0f172a;
color:white;
padding:20px;
display:flex;
flex-direction:column;
}

.logo{
font-size:22px;
font-weight:700;
margin-bottom:25px;
}

.nav-item{
padding:12px;
border-radius:8px;
margin-bottom:6px;
cursor:pointer;
color:#94a3b8;
}

.nav-item:hover{
background:#1e293b;
color:white;
}

.nav-item.active{
background:#1e293b;
color:white;
}

/* MAIN */

.main{
flex:1;
display:flex;
flex-direction:column;
}

/* HEADER */

.header{
background:white;
padding:15px 25px;
border-bottom:1px solid #e2e8f0;
display:flex;
justify-content:space-between;
align-items:center;
}

.title{
font-size:20px;
font-weight:700;
}

/* DASHBOARD */

.dashboard{
padding:25px;
overflow:auto;
}

/* STATS */

.stats{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
margin-bottom:20px;
}

.stat{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 2px 8px rgba(0,0,0,0.06);
}

.stat span{
font-size:12px;
color:#64748b;
text-transform:uppercase;
font-weight:600;
}

.stat h2{
margin-top:8px;
font-size:28px;
}

/* FILTERS */

.filters{
background:white;
padding:12px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.05);
display:flex;
gap:10px;
align-items:center;
margin-bottom:15px;
}

.filters input,
.filters select{
padding:7px;
border-radius:6px;
border:1px solid #cbd5e1;
}

.filters button{
background:#2563eb;
border:none;
color:white;
padding:8px 16px;
border-radius:6px;
cursor:pointer;
}

/* TABLE */

.table-container{
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#1e293b;
color:white;
padding:12px;
font-size:13px;
text-align:left;
}

td{
padding:14px;
border-bottom:1px solid #f1f5f9;
font-size:14px;
vertical-align:middle;
}

tr:hover{
background:#f8fafc;
}

/* STATUS */

.badge{
padding:5px 10px;
border-radius:20px;
font-size:11px;
font-weight:700;
}

.open{
background:#fee2e2;
color:#b91c1c;
}

.assigned{
background:#fef3c7;
color:#92400e;
}

.closed{
background:#dcfce7;
color:#166534;
}

/* ASSIGN */

select.assign{
padding:6px;
border-radius:6px;
border:1px solid #cbd5e1;
width:150px;
}

.location-link{
color:#2563eb;
cursor:pointer;
}

</style>
</head>

<body>

<div class="sidebar">

<div class="logo">🚑 RSA Dispatch</div>

<div class="nav-item active">Dashboard</div>
<div class="nav-item" onclick="openLiveMap()">Live Map</div>
<div class="nav-item">Technicians</div>
<div class="nav-item">Reports</div>

</div>


<div class="main">

<div class="header">
<div class="title">Control Room</div>
<div>Live System</div>
</div>


<div class="dashboard">

<!-- STATS -->

<div class="stats">

<div class="stat">
<span>OPEN</span>
<h2 id="openCount">0</h2>
</div>

<div class="stat">
<span>ASSIGNED</span>
<h2 id="assignedCount">0</h2>
</div>

<div class="stat">
<span>CLOSED</span>
<h2 id="closedCount">0</h2>
</div>

</div>


<!-- FILTER -->

<div class="filters">

Start
<input type="date" id="startDate">

End
<input type="date" id="endDate">

Status
<select id="status">
<option value="">All</option>
<option value="OPEN">OPEN</option>
<option value="ASSIGNED">ASSIGNED</option>
<option value="CLOSED">CLOSED</option>
</select>

<button onclick="loadTickets()">Filter</button>

</div>


<!-- TABLE -->

<div class="table-container">

<table>

<thead>
<tr>
<th>ID</th>
<th>Rider</th>
<th>Mobile</th>
<th>Location</th>
<th>Status</th>
<th>Technician</th>
<th>Assign</th>
</tr>
</thead>

<tbody id="ticketsTable"></tbody>

</table>

</div>

</div>
</div>


<script>

let technicians=[]

async function loadTechnicians(){

let res=await fetch("/technicians")
technicians=await res.json()

}


async function loadTickets(){

let status=document.getElementById("status").value
let start=document.getElementById("startDate").value
let end=document.getElementById("endDate").value

let url="/tickets?status="+status+"&start_date="+start+"&end_date="+end

let res=await fetch(url)
let tickets=await res.json()

let table=document.getElementById("ticketsTable")
table.innerHTML=""

let open=0
let assigned=0
let closed=0

tickets.forEach(t=>{

if(t.status==="OPEN") open++
if(t.status==="ASSIGNED") assigned++
if(t.status==="CLOSED") closed++

let techOptions="<option value=''>Select</option>"

technicians.forEach(tech=>{
techOptions+=`<option value="${tech.name}">${tech.name} (${tech.region})</option>`
})

let statusClass="badge open"

if(t.status==="ASSIGNED") statusClass="badge assigned"
if(t.status==="CLOSED") statusClass="badge closed"

table.innerHTML+=`

<tr>

<td style="font-weight:600;color:#2563eb">${t.id}</td>

<td>${t.rider || "-"}</td>

<td style="font-size:13px;color:#64748b">${t.mobile || "-"}</td>

<td class="location-link"
onclick="openMap('${t.location}','${t.latitude}','${t.longitude}')">

${t.location || (t.latitude+","+t.longitude)}

</td>

<td>
<span class="${statusClass}">
${t.status}
</span>
</td>

<td>${t.technician || "-"}</td>

<td>

<select class="assign"
onchange="assignTicket('${t.id}',this.value)">

${techOptions}

</select>

</td>

</tr>

`

})

document.getElementById("openCount").innerText=open
document.getElementById("assignedCount").innerText=assigned
document.getElementById("closedCount").innerText=closed

}



async function assignTicket(ticketId,tech){

if(!tech) return

await fetch("/assign_ticket",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
ticket_id:ticketId,
technician:tech
})
})

loadTickets()

}


function openMap(location,lat,lon){

if(lat && lon && lat!="null"){

window.open(
`https://www.google.com/maps?q=${lat},${lon}`,
"_blank"
)

}else if(location){

window.open(
`https://www.google.com/maps?q=${location}`,
"_blank"
)

}else{

alert("Location not available")

}

}


function openLiveMap(){

window.open("https://www.google.com/maps","_blank")

}


async function init(){

await loadTechnicians()

loadTickets()

setInterval(loadTickets,5000)

}

init()

</script>

</body>
</html>
